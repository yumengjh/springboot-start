<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Spring Boot API 测试页</title>
  <style>
    body { max-width: 760px; margin: 32px auto; padding: 0 16px; font: 15px/1.5 system-ui, sans-serif; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 16px 0; }
    input, button { box-sizing: border-box; padding: 8px; margin: 4px 0; }
    input { width: 100%; } button { cursor: pointer; margin-right: 8px; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #111; color: #d7ffd7; padding: 12px; border-radius: 8px; }
    label { display: block; font-weight: 600; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Spring Boot API 测试页</h1>

  <label>服务地址</label>
  <input id="baseUrl" value="http://localhost:8080">

  <section>
    <h2>注册</h2>
    <input id="username" placeholder="用户名，例如 demo_user">
    <input id="displayName" placeholder="显示名，例如 Demo User">
    <input id="password" type="password" placeholder="密码，至少 10 位">
    <button onclick="register()">注册</button>
  </section>

  <section>
    <h2>认证</h2>
    <button onclick="login()">登录</button>
    <button onclick="refresh()">刷新 Token</button>
    <button onclick="logout()">登出</button>
    <p>登录或刷新成功后，Refresh Token 会自动保存到当前浏览器页面。</p>
  </section>

  <h2>响应</h2>
  <pre id="output">等待请求…</pre>

  <script>
    const output = document.querySelector('#output');
    const value = id => document.querySelector(`#${id}`).value;
    const baseUrl = () => value('baseUrl').replace(/\/$/, '');
    let refreshToken = '';

    async function request(path, body) {
      try {
        const response = await fetch(`${baseUrl()}${path}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const text = await response.text();
        const data = text ? JSON.parse(text) : null;
        output.textContent = `HTTP ${response.status}\n${JSON.stringify(data, null, 2)}`;
        return { response, data };
      } catch (error) {
        output.textContent = `请求失败：${error.message}`;
        throw error;
      }
    }

    async function register() {
      await request('/api/v1/auth/register', {
        username: value('username'), displayName: value('displayName'), password: value('password')
      });
    }

    async function login() {
      const { data } = await request('/api/v1/auth/login', {
        username: value('username'), password: value('password')
      });
      if (data?.refreshToken) refreshToken = data.refreshToken;
    }

    async function refresh() {
      const { data } = await request('/api/v1/auth/refresh', { refreshToken });
      if (data?.refreshToken) refreshToken = data.refreshToken;
    }

    async function logout() {
      await request('/api/v1/auth/logout', { refreshToken });
      refreshToken = '';
    }
  </script>
</body>
</html>
