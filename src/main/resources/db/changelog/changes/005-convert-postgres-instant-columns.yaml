databaseChangeLog:
  - changeSet:
      id: 005-convert-postgres-instant-columns
      author: starter
      dbms: postgresql
      changes:
        - sql:
            sql: |
              alter table users alter column locked_until type varchar(64) using to_char(locked_until at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table users alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table users alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table roles alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table roles alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table permissions alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table permissions alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table refresh_sessions alter column issued_at type varchar(64) using to_char(issued_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table refresh_sessions alter column expires_at type varchar(64) using to_char(expires_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table refresh_sessions alter column consumed_at type varchar(64) using to_char(consumed_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table refresh_sessions alter column revoked_at type varchar(64) using to_char(revoked_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table system_settings alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table system_settings alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table ip_access_rules alter column expires_at type varchar(64) using to_char(expires_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table ip_access_rules alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table ip_access_rules alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table audit_events alter column occurred_at type varchar(64) using to_char(occurred_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table announcements alter column published_at type varchar(64) using to_char(published_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table announcements alter column created_at type varchar(64) using to_char(created_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
              alter table announcements alter column updated_at type varchar(64) using to_char(updated_at at time zone 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS.US"Z"');
