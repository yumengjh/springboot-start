databaseChangeLog:
  - changeSet:
      id: 014-maintenance-gc
      author: starter
      changes:
        - createTable:
            tableName: maintenance_gc_policies
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: resource_code, type: varchar(100), constraints: { nullable: false, unique: true, uniqueConstraintName: uk_maintenance_gc_policies_resource } }
              - column: { name: enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: automatic_enabled, type: boolean, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: retention_days, type: int, defaultValueNumeric: 30, constraints: { nullable: false } }
              - column: { name: batch_size, type: int, defaultValueNumeric: 500, constraints: { nullable: false } }
              - column: { name: version, type: bigint, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_at, type: varchar(64), constraints: { nullable: false } }
              - column: { name: updated_at, type: varchar(64), constraints: { nullable: false } }
        - createTable:
            tableName: maintenance_gc_runs
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: status, type: varchar(32), constraints: { nullable: false } }
              - column: { name: trigger_type, type: varchar(32), constraints: { nullable: false } }
              - column: { name: dry_run, type: boolean, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: requested_by, type: varchar(36) }
              - column: { name: resource_codes, type: text }
              - column: { name: summary_json, type: text }
              - column: { name: error_message, type: varchar(1000) }
              - column: { name: trace_id, type: varchar(100) }
              - column: { name: started_at, type: varchar(64), constraints: { nullable: false } }
              - column: { name: completed_at, type: varchar(64) }
              - column: { name: version, type: bigint, defaultValueNumeric: 0, constraints: { nullable: false } }
        - createIndex:
            tableName: maintenance_gc_runs
            indexName: idx_maintenance_gc_runs_started_at
            columns: [ { column: { name: started_at, descending: true } } ]
        - createTable:
            tableName: maintenance_gc_locks
            columns:
              - column: { name: lock_name, type: varchar(100), constraints: { primaryKey: true, nullable: false } }
              - column: { name: run_id, type: varchar(36) }
              - column: { name: locked_until, type: varchar(64) }
              - column: { name: updated_at, type: varchar(64), constraints: { nullable: false } }
        - createIndex:
            tableName: refresh_sessions
            indexName: idx_refresh_sessions_user_issued
            columns:
              - column: { name: user_id }
              - column: { name: issued_at, descending: true }
        - createIndex:
            tableName: refresh_sessions
            indexName: idx_refresh_sessions_family
            columns: [ { column: { name: family_id } } ]
        - createIndex:
            tableName: refresh_sessions
            indexName: idx_refresh_sessions_expires_at
            columns: [ { column: { name: expires_at } } ]
