databaseChangeLog:
  - changeSet:
      id: 013-resume-feedback
      author: starter
      changes:
        - createTable:
            tableName: resume_feedbacks
            columns:
              - column: { name: id, type: varchar(36), constraints: { primaryKey: true, nullable: false } }
              - column: { name: type, type: varchar(32), constraints: { nullable: false } }
              - column: { name: reaction, type: varchar(32) }
              - column: { name: rating, type: int }
              - column: { name: suggestion, type: text }
              - column: { name: ip_address, type: varchar(64), constraints: { nullable: false } }
              - column: { name: user_agent, type: varchar(512) }
              - column: { name: status, type: varchar(32), constraints: { nullable: false } }
              - column: { name: version, type: bigint, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp with time zone, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamp with time zone, constraints: { nullable: false } }
        - createIndex:
            tableName: resume_feedbacks
            indexName: idx_resume_feedbacks_created_at
            columns:
              - column: { name: created_at, descending: true }
        - createIndex:
            tableName: resume_feedbacks
            indexName: idx_resume_feedbacks_rate_limit
            columns:
              - column: { name: type }
              - column: { name: ip_address }
              - column: { name: created_at, descending: true }
