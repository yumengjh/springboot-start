spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  jackson:
    time-zone: UTC
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    hibernate:
      ddl-auto: validate
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful
  forward-headers-strategy: none

app:
  security:
    trusted-proxies: ${APP_SECURITY_TRUSTED_PROXIES:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
