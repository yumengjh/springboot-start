spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
app:
  jwt:
    allow-ephemeral-key: false
